<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pogodapp</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="intro">
        <p class="eyebrow">Climate preference search</p>
        <h1>Pogodapp</h1>
        <p class="lede">
          Describe an ideal climate profile, score places against long-term normals, and inspect the results on one map.
        </p>
      </section>

      <section class="panel" aria-label="Controls area">
        <h2>Controls</h2>
        <form
          id="preferences"
          hx-post="/score"
          hx-trigger="input changed delay:300ms"
          hx-swap="none"
        >
          {% for preference in preferences %}
          <label class="control" for="{{ preference.name }}">
            <span>{{ preference.label }}</span>
            <input
              id="{{ preference.name }}"
              name="{{ preference.name }}"
              type="range"
              data-field="{{ preference.name }}"
              min="{{ preference.minimum }}"
              max="{{ preference.maximum }}"
              step="{{ preference.step }}"
              value="{{ preference.value }}"
            />
            <output for="{{ preference.name }}">{{ preference.value }}</output>
          </label>
          {% endfor %}
        </form>
      </section>

      <section class="panel map-panel" aria-label="Map container">
        <h2>Map</h2>
        <div id="map" role="img" aria-label="Map results placeholder"></div>
      </section>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/map.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("preferences");

        if (!form) {
          return;
        }

        for (const input of form.querySelectorAll("input[type='range']")) {
          const output = form.querySelector(`output[for='${input.id}']`);

          if (output) {
            output.value = input.value;
          }

          input.addEventListener("input", () => {
            if (output) {
              output.value = input.value;
            }
          });
        }

        document.body.addEventListener("htmx:afterRequest", (event) => {
          // Ignore unrelated HTMX requests once the page grows past one form.
          if (event.detail.elt !== form || event.detail.xhr.status !== 200) {
            return;
          }

          const scores = JSON.parse(event.detail.xhr.responseText);
          window.renderScores(scores);
        });
      });
    </script>
  </body>
</html>
