<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pogodapp</title>
    <link rel="stylesheet" href="/static/vendor/maplibre-gl.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>POGODAPP</h1>
        <p class="subtitle">Pick the climate you like and see where it shows up.</p>
        <div class="header-meta">
          <a href="https://github.com/adrunkhuman/pogodapp" class="github-link" target="_blank" rel="noopener noreferrer" aria-label="View source on GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
            </svg>
          </a>
          <ul class="data-credits" aria-label="Data sources">
            <li><a href="https://worldclim.org" target="_blank" rel="noopener noreferrer">WorldClim 2.1</a></li>
            <li><a href="https://geonames.org" target="_blank" rel="noopener noreferrer">GeoNames</a></li>
          </ul>
        </div>
      </header>

      <section class="app-panel controls-panel" aria-label="Controls area">
        <h2>Controls</h2>
        <form
          id="preferences"
          hx-post="/score"
          hx-trigger="load, change"
          hx-sync="this:replace"
          hx-swap="none"
          hx-request='{"timeout": 30000}'
        >
          {% for preference in preferences %}
          <label class="control" for="{{ preference.name }}">
            <span class="control__header">
              <span class="control__label">{{ preference.label }}</span>
              <output class="control__value" for="{{ preference.name }}">{{ preference.value }}</output>
            </span>
            <span class="control__description">{{ preference.description }}</span>
            <input
              id="{{ preference.name }}"
              name="{{ preference.name }}"
              type="range"
              data-field="{{ preference.name }}"
              min="{{ preference.minimum }}"
              max="{{ preference.maximum }}"
              step="{{ preference.step }}"
              value="{{ preference.value }}"
            />
            <span class="control__scale" aria-hidden="true">
              <span>{{ preference.low_label }}</span>
              <span>{{ preference.high_label }}</span>
            </span>
          </label>
          {% endfor %}
        </form>
      </section>

      <section class="app-panel map-panel" aria-label="Map container">
        <h2>Map</h2>
        <p id="map-status" class="visually-hidden" role="status" aria-live="polite"></p>
        <p id="map-description" class="visually-hidden">Climate compatibility</p>
        <div id="map-probe-tooltip" class="map-probe-tooltip" aria-hidden="true" hidden></div>
        <div id="map-legend" class="map-legend" aria-label="Map legend">
          <span class="map-legend__item map-legend__item--low"><span aria-hidden="true">■</span> LOW</span>
          <span class="map-legend__item map-legend__item--mid"><span aria-hidden="true">■</span> MED</span>
          <span class="map-legend__item map-legend__item--high"><span aria-hidden="true">■</span> HIGH</span>
        </div>
        <div id="map" role="region" aria-label="Interactive climate score map" aria-describedby="map-description map-legend map-status"></div>
      </section>

      <section class="app-panel results-panel" aria-labelledby="score-results-title">
        <h2 id="score-results-title">Scored locations</h2>
        <ul id="score-results-list"></ul>
      </section>
    </main>
    <script src="/static/vendor/htmx.min.js"></script>
    <script src="/static/vendor/maplibre-gl.js"></script>
    <script>
      window.POGODAPP_MAP_CONFIG = {
        projection: {{ map_projection.name | tojson }},
        imageCorners: {{ map_projection.image_corners | tojson }},
        probeGridDegrees: {{ probe_grid_degrees | tojson }},
      };
    </script>
    <script src="/static/map-core.js"></script>
    <script src="/static/map-sidebar.js"></script>
    <script src="/static/map-probe.js"></script>
    <script src="/static/map-layers.js"></script>
    <script src="/static/map.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
