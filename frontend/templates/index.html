<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pogodapp</title>
    <link rel="stylesheet" href="/static/vendor/maplibre-gl.css" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>POGODAPP</h1>
        <p class="subtitle">
          Describe an ideal climate profile, score places against long-term normals, and inspect the strongest matches on one screen.
        </p>
      </header>

      <section class="app-panel controls-panel" aria-label="Controls area">
        <h2>Controls</h2>
        <form
          id="preferences"
          hx-post="/score"
          hx-trigger="input changed delay:300ms"
          hx-swap="none"
        >
          {% for preference in preferences %}
          <label class="control" for="{{ preference.name }}">
            <span class="control__header">
              <span class="control__label">{{ preference.label }}</span>
              <output class="control__value" for="{{ preference.name }}">{{ preference.value }}</output>
            </span>
            <input
              id="{{ preference.name }}"
              name="{{ preference.name }}"
              type="range"
              data-field="{{ preference.name }}"
              min="{{ preference.minimum }}"
              max="{{ preference.maximum }}"
              step="{{ preference.step }}"
              value="{{ preference.value }}"
            />
          </label>
          {% endfor %}
        </form>
      </section>

      <section class="app-panel map-panel" aria-label="Map container">
        <p id="map-status" class="visually-hidden" role="status" aria-live="polite"></p>
        <p id="map-description" class="visually-hidden">Interactive climate score map.</p>
        <div id="map-legend" class="map-legend" aria-label="Map legend">
          <span class="map-legend__item"><span class="map-legend__swatch map-legend__swatch--low" aria-hidden="true">■</span> LOW</span>
          <span class="map-legend__item"><span class="map-legend__swatch map-legend__swatch--mid" aria-hidden="true">■</span> MED</span>
          <span class="map-legend__item"><span class="map-legend__swatch map-legend__swatch--high" aria-hidden="true">■</span> HIGH</span>
        </div>
        <div id="map" role="region" aria-label="Interactive climate score map" aria-describedby="map-description map-legend map-status"></div>
      </section>

      <section class="app-panel results-panel" aria-labelledby="score-results-title">
        <h2 id="score-results-title">Scored locations</h2>
        <ul id="score-results-list"></ul>
      </section>
    </main>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/vendor/maplibre-gl.js"></script>
    <script src="/static/map.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("preferences");

        if (!form) {
          return;
        }

        for (const input of form.querySelectorAll("input[type='range']")) {
          const output = form.querySelector(`output[for='${input.id}']`);

          const syncControl = () => {
            const minimum = Number(input.min);
            const maximum = Number(input.max);
            const value = Number(input.value);
            const progress = ((value - minimum) / (maximum - minimum)) * 100;

            input.style.setProperty("--range-progress", `${progress}%`);

            if (output) {
              output.value = input.value;
            }
          };

          syncControl();
          input.addEventListener("input", syncControl);
        }

        document.body.addEventListener("htmx:afterRequest", (event) => {
          // Ignore unrelated HTMX requests once the page grows past one form.
          if (event.detail.elt !== form || event.detail.xhr.status !== 200) {
            return;
          }

          const scores = JSON.parse(event.detail.xhr.responseText);
          window.renderScores(scores);
        });
      });
    </script>
  </body>
</html>
